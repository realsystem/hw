---
- name: Install network packages
  apt:
    name:
      - ifenslave
      - bridge-utils
      - vlan
    state: present

- name: Configure sysctl for networking
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: yes
    reload: yes
  loop:
    - { name: 'net.core.rmem_max', value: '134217728' }
    - { name: 'net.core.wmem_max', value: '134217728' }
    - { name: 'net.core.rmem_default', value: '33554432' }
    - { name: 'net.core.wmem_default', value: '33554432' }
    - { name: 'net.core.netdev_max_backlog', value: '10000' }
    - { name: 'net.core.somaxconn', value: '4096' }
    - { name: 'net.ipv4.tcp_rmem', value: '4096 87380 134217728' }
    - { name: 'net.ipv4.tcp_wmem', value: '4096 65536 134217728' }
    - { name: 'net.ipv4.tcp_congestion_control', value: 'htcp' }
    - { name: 'net.ipv4.tcp_mtu_probing', value: '1' }
    - { name: 'net.ipv4.tcp_timestamps', value: '1' }
    - { name: 'net.ipv4.tcp_sack', value: '1' }
    - { name: 'net.ipv4.tcp_window_scaling', value: '1' }
  ignore_errors: yes  # Docker limitation - requires host kernel access

- name: Set MTU 9000 for all Ethernet interfaces (for Ceph networks)
  lineinfile:
    path: /etc/network/interfaces.d/{{ item }}
    line: "    mtu 9000"
    insertafter: "iface {{ item }} inet"
    create: yes
  loop:
    - eth1
    - eth2
    - eth3
  when: "'ceph_osd' in group_names"
  notify: restart networking
  ignore_errors: yes

- name: Ensure persistent sysctl configuration
  copy:
    content: |
      # Network Performance Tuning for Ceph
      net.core.rmem_max = 134217728
      net.core.wmem_max = 134217728
      net.core.rmem_default = 33554432
      net.core.wmem_default = 33554432
      net.core.netdev_max_backlog = 10000
      net.core.somaxconn = 4096
      net.ipv4.tcp_rmem = 4096 87380 134217728
      net.ipv4.tcp_wmem = 4096 65536 134217728
      net.ipv4.tcp_congestion_control = htcp
      net.ipv4.tcp_mtu_probing = 1
      net.ipv4.tcp_timestamps = 1
      net.ipv4.tcp_sack = 1
      net.ipv4.tcp_window_scaling = 1
    dest: /etc/sysctl.d/60-ceph-network.conf
    mode: '0644'
