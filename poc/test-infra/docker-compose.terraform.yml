# Test environment with mock Foreman API for Terraform testing
# Includes: mock Foreman API + 3 simulated nodes

services:
  # Mock Foreman API Server
  foreman-mock:
    build:
      context: ./foreman-mock
      dockerfile: Dockerfile
    container_name: foreman-mock
    hostname: foreman.local
    ports:
      - "3000:3000"      # Foreman API
    networks:
      test-net:
        ipv4_address: 172.35.0.10

  # Simulated Node 1 (OSD)
  node-01:
    build:
      context: ./nodes
      dockerfile: Dockerfile.node
    container_name: node-01
    hostname: ceph-osd-r07-u12
    privileged: true
    ports:
      - "2301:22"
    networks:
      test-net:
        ipv4_address: 172.35.0.100
        mac_address: "52:54:00:aa:bb:01"
    environment:
      NODE_TYPE: osd
      NODE_RACK: "7"
      NODE_UNIT: "12"
      MANAGEMENT_IP: 10.10.7.12
      IPMI_ADDRESS: 10.20.7.12

  # Simulated Node 2 (OSD)
  node-02:
    build:
      context: ./nodes
      dockerfile: Dockerfile.node
    container_name: node-02
    hostname: ceph-osd-r07-u13
    privileged: true
    ports:
      - "2302:22"
    networks:
      test-net:
        ipv4_address: 172.35.0.101
        mac_address: "52:54:00:aa:bb:02"
    environment:
      NODE_TYPE: osd
      NODE_RACK: "7"
      NODE_UNIT: "13"
      MANAGEMENT_IP: 10.10.7.13
      IPMI_ADDRESS: 10.20.7.13

  # Simulated Node 3 (MON)
  node-03:
    build:
      context: ./nodes
      dockerfile: Dockerfile.node
    container_name: node-03
    hostname: ceph-mon-r03-u05
    privileged: true
    ports:
      - "2303:22"
    networks:
      test-net:
        ipv4_address: 172.35.0.110
        mac_address: "52:54:00:aa:bb:10"
    environment:
      NODE_TYPE: mon
      NODE_RACK: "3"
      NODE_UNIT: "5"
      MANAGEMENT_IP: 10.10.3.5
      IPMI_ADDRESS: 10.20.3.5

networks:
  test-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.35.0.0/16
          gateway: 172.35.0.1
