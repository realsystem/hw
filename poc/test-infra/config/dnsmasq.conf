# DHCP Configuration for Provisioning Network
interface=eth0
bind-interfaces

# DHCP Range
dhcp-range=172.30.0.100,172.30.0.200,255.255.0.0,12h

# DNS
no-resolv
server=8.8.8.8
server=8.8.4.4

# PXE Boot Settings
dhcp-boot=pxelinux.0,foreman.local,172.30.0.31

# TFTP
enable-tftp
tftp-root=/var/lib/tftpboot

# Logging
log-dhcp
log-queries

# Static IP assignments based on MAC
dhcp-host=52:54:00:aa:bb:01,172.30.0.100,ceph-osd-r07-u12
dhcp-host=52:54:00:aa:bb:02,172.30.0.101,ceph-osd-r07-u13
dhcp-host=52:54:00:aa:bb:10,172.30.0.110,ceph-mon-r03-u05
